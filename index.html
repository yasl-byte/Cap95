<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#15110d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Cap 95 — Plan de Yassine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#15110d; --bg2:#1d1812; --card:#241d15; --card2:#2c241a;
  --line:#3a3022; --line2:#4a3d2b;
  --ink:#f5e9d8; --ink2:#cdbfa8; --ink3:#9b8a6f;
  --amber:#e0974a; --amber-bright:#f4b265; --amber-soft:#d98a3d;
  --green:#7fb069; --red:#d96b4a; --blue:#6a9cc4; --yellow:#e0b84a;
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;overscroll-behavior:none}
body{
  background-image:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(224,151,74,.10), transparent 60%),
    radial-gradient(ellipse 80% 50% at 100% 100%, rgba(106,156,196,.05), transparent 60%);
  min-height:100vh;
  padding-bottom:env(safe-area-inset-bottom);
}
.app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:88px}

/* ---------- HEADER ---------- */
.hd{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 70%,transparent);
  padding:calc(env(safe-area-inset-top) + 14px) 18px 10px;backdrop-filter:blur(8px)}
.hd-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-family:'Fraunces',serif;font-weight:600;font-size:22px;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px var(--amber)}
.streak{font-size:13px;color:var(--ink2);display:flex;align-items:center;gap:6px;background:var(--card);
  padding:7px 12px;border-radius:30px;border:1px solid var(--line)}
.streak b{color:var(--amber-bright);font-weight:700}

/* ---------- DATE NAV ---------- */
.datenav{display:flex;align-items:center;gap:10px;margin-top:12px}
.datenav button{background:var(--card);border:1px solid var(--line);color:var(--ink);width:42px;height:42px;
  border-radius:13px;font-size:20px;display:grid;place-items:center;cursor:pointer;flex:none;transition:.15s}
.datenav button:active{transform:scale(.92);background:var(--card2)}
.datenav .cur{flex:1;text-align:center}
.datenav .cur .d1{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber)}
.datenav .cur .d2{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-top:2px}
.datenav .cur .d3{font-size:11px;color:var(--ink3);margin-top:2px}

/* ---------- TABS / SECTIONS ---------- */
.scroll{padding:6px 16px 20px}
.badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:6px 13px;border-radius:30px;
  letter-spacing:.02em;margin:8px 0 16px}
.badge.on{background:rgba(224,151,74,.16);color:var(--amber-bright);border:1px solid rgba(224,151,74,.3)}
.badge.off{background:rgba(106,156,196,.14);color:var(--blue);border:1px solid rgba(106,156,196,.28)}
.badge.we{background:rgba(127,176,105,.14);color:var(--green);border:1px solid rgba(127,176,105,.28)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;
  box-shadow:var(--shadow)}
.card-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-h .ic{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex:none}
.card-h h2{font-family:'Fraunces',serif;font-size:18px;font-weight:600;letter-spacing:-.01em}
.card-h .sub{font-size:11.5px;color:var(--ink3);margin-top:1px}

/* quote */
.quote{background:linear-gradient(135deg,rgba(224,151,74,.12),rgba(224,151,74,.03));
  border:1px solid rgba(224,151,74,.2);border-radius:var(--radius);padding:18px 18px 18px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.quote::before{content:'"';position:absolute;top:-18px;left:10px;font-family:'Fraunces',serif;font-size:90px;color:rgba(224,151,74,.13);font-weight:700}
.quote p{font-family:'Fraunces',serif;font-size:15.5px;font-style:italic;line-height:1.5;color:var(--ink);position:relative}
.quote .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:8px;font-family:'Outfit'}

/* planning timeline */
.tl{position:relative;padding-left:6px}
.tl-item{display:flex;gap:14px;padding:9px 0;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:33px;top:30px;bottom:-9px;width:2px;background:var(--line)}
.tl-time{font-size:12px;font-weight:700;color:var(--amber);width:54px;flex:none;text-align:right;padding-top:2px;font-variant-numeric:tabular-nums}
.tl-dot{width:11px;height:11px;border-radius:50%;background:var(--card);border:2px solid var(--line2);flex:none;margin-top:4px;z-index:1}
.tl-item.sport .tl-dot{background:var(--amber);border-color:var(--amber);box-shadow:0 0 10px var(--amber)}
.tl-txt{font-size:13.5px;line-height:1.45;color:var(--ink2);padding-top:1px}
.tl-item.sport .tl-txt{color:var(--ink);font-weight:600}

/* meal */
.meal{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;background:var(--bg2)}
.meal-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:8px}
.meal-h .mn{font-weight:600;font-size:14px}
.meal-h .mt{font-size:11px;color:var(--amber);font-weight:600;flex:none}
.meal-items{display:flex;flex-direction:column;gap:5px}
.meal-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink2);gap:10px}
.meal-row .q{color:var(--ink3);flex:none}
.meal-macros{display:flex;gap:8px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line)}
.macro{flex:1;text-align:center;font-size:11px}
.macro b{display:block;font-size:14px;color:var(--ink);font-weight:700;margin-bottom:1px}
.macro.p b{color:var(--red)} .macro.l b{color:var(--yellow)} .macro.g b{color:var(--blue)} .macro.k b{color:var(--amber-bright)}
.macro span{color:var(--ink3);font-size:10px;letter-spacing:.05em}
.cal-target{text-align:center;font-size:12px;color:var(--ink3);margin-top:4px}
.cal-target b{color:var(--amber)}

/* workout */
.exo{border-left:3px solid var(--amber-soft);background:var(--bg2);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:9px}
.exo-h{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.exo-h .en{font-weight:600;font-size:13.5px;line-height:1.3}
.exo-h .es{font-size:11px;color:var(--amber);font-weight:700;flex:none;white-space:nowrap}
.exo .ch{font-size:12px;color:var(--green);margin-top:4px;font-weight:600}
.exo .nt{font-size:11.5px;color:var(--ink3);margin-top:4px;line-height:1.4;font-style:italic}
.warmup{background:rgba(224,151,74,.07);border:1px dashed rgba(224,151,74,.25);border-radius:12px;padding:13px;margin-bottom:12px}
.warmup .wt{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:8px}
.warmup ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.warmup li{font-size:12.5px;color:var(--ink2);padding-left:18px;position:relative;line-height:1.4}
.warmup li::before{content:'→';position:absolute;left:0;color:var(--amber)}
.finisher{font-size:12px;color:var(--ink2);margin-top:8px;padding:10px 12px;background:rgba(127,176,105,.08);border-radius:10px;border:1px solid rgba(127,176,105,.18)}
.yt-btn{display:inline-flex;align-items:center;gap:7px;margin-top:9px;font-size:12px;font-weight:600;color:#ff5a4d;
  background:rgba(255,90,77,.1);border:1px solid rgba(255,90,77,.28);padding:7px 13px;border-radius:30px;text-decoration:none;transition:.15s}
.yt-btn:active{transform:scale(.95);background:rgba(255,90,77,.18)}
.yt-btn svg{width:16px;height:16px}
.yt-mini{color:#ff7a6d;text-decoration:none;font-weight:600;font-size:11px;white-space:nowrap;background:rgba(255,90,77,.1);padding:2px 8px;border-radius:20px;margin-left:4px}

/* tasks / points */
.task{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer}
.task:last-child{border-bottom:none}
.cbx{width:26px;height:26px;border-radius:9px;border:2px solid var(--line2);flex:none;display:grid;place-items:center;transition:.18s}
.task.done .cbx{background:var(--amber);border-color:var(--amber)}
.cbx svg{width:15px;height:15px;opacity:0;transform:scale(.4);transition:.18s}
.task.done .cbx svg{opacity:1;transform:scale(1)}
.task .tlab{flex:1;font-size:13.5px;color:var(--ink2);transition:.18s}
.task.done .tlab{color:var(--ink3);text-decoration:line-through}
.task .tp{font-size:12px;font-weight:700;color:var(--amber);flex:none}
.pts-bar{margin-top:14px;background:var(--bg2);border-radius:12px;padding:13px}
.pts-bar .pl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;color:var(--ink2)}
.pts-bar .pl b{color:var(--amber-bright)}
.bar{height:9px;background:var(--line);border-radius:6px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--amber-soft),var(--amber-bright));border-radius:6px;transition:.4s ease;width:0}

/* savoir */
.savoir{background:linear-gradient(135deg,rgba(106,156,196,.1),rgba(106,156,196,.02));border:1px solid rgba(106,156,196,.2);
  border-radius:var(--radius);padding:16px 18px;margin-bottom:14px}
.savoir .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.savoir p{font-size:13.5px;line-height:1.5;color:var(--ink2)}

/* reading */
.book{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px;background:var(--bg2)}
.book-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:8px}
.book-h .bt{font-family:'Fraunces',serif;font-size:14.5px;font-weight:600;line-height:1.25}
.book-h .ba{font-size:11px;color:var(--ink3);margin-top:2px}
.book .bprog{display:flex;align-items:center;gap:10px;margin-top:11px}
.book .bbar{flex:1;height:8px;background:var(--line);border-radius:5px;overflow:hidden}
.book .bbar i{display:block;height:100%;background:linear-gradient(90deg,#8a6fb0,#b08fd0);border-radius:5px;transition:.3s}
.book .bpct{font-size:12px;font-weight:700;color:#b08fd0;width:42px;text-align:right;font-variant-numeric:tabular-nums}
.page-ctrl{display:flex;align-items:center;gap:8px;margin-top:11px}
.page-ctrl input{flex:1;background:var(--bg);border:1px solid var(--line2);color:var(--ink);border-radius:10px;
  padding:9px 12px;font-size:13px;font-family:inherit;width:100%}
.page-ctrl input:focus{outline:none;border-color:var(--amber)}
.page-ctrl .pg-of{font-size:12px;color:var(--ink3);flex:none}

/* bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:40;
  background:linear-gradient(180deg,transparent,var(--bg) 28%);padding:12px 18px calc(env(safe-area-inset-bottom) + 12px)}
.nav-in{background:var(--card2);border:1px solid var(--line);border-radius:20px;display:flex;padding:6px;box-shadow:var(--shadow)}
.nav-in button{flex:1;background:none;border:none;color:var(--ink3);padding:10px 4px;border-radius:14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;font-size:10px;font-weight:600;transition:.18s}
.nav-in button svg{width:21px;height:21px}
.nav-in button.active{background:var(--amber);color:#241a0e}
.nav-in button.active svg{stroke:#241a0e}

/* views */
.view{display:none}
.view.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* progress view */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center}
.stat .sv{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--amber-bright);line-height:1}
.stat .sl{font-size:11px;color:var(--ink3);margin-top:6px;letter-spacing:.03em}
.ring-wrap{display:flex;justify-content:center;margin:6px 0 18px}
.medal-list{display:flex;flex-direction:column;gap:10px}
.medal{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.medal.locked{opacity:.42}
.medal .mi{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:24px;flex:none;background:var(--bg2)}
.medal.unlocked .mi{background:rgba(224,151,74,.15)}
.medal .mtxt b{font-size:14px;display:block}
.medal .mtxt span{font-size:11.5px;color:var(--ink3)}
.weight-input{display:flex;gap:10px;margin-top:12px}
.weight-input input{flex:1;background:var(--bg);border:1px solid var(--line2);color:var(--ink);border-radius:12px;padding:12px;font-size:15px;font-family:inherit;text-align:center}
.weight-input input:focus{outline:none;border-color:var(--amber)}
.weight-input button{background:var(--amber);color:#241a0e;border:none;border-radius:12px;padding:0 20px;font-weight:700;font-family:inherit;cursor:pointer}

.collapse-h{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.collapse-h .chev{transition:.25s;color:var(--ink3)}
.collapse-h.closed .chev{transform:rotate(-90deg)}
.collapse-body{overflow:hidden;transition:max-height .3s ease}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--amber);color:#241a0e;
  padding:12px 22px;border-radius:30px;font-weight:700;font-size:13.5px;z-index:100;opacity:0;transition:.3s;box-shadow:var(--shadow);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.install-tip{background:rgba(127,176,105,.1);border:1px solid rgba(127,176,105,.25);border-radius:14px;padding:13px 15px;font-size:12.5px;color:var(--ink2);margin-bottom:14px;line-height:1.5;display:none}
.install-tip.show{display:block}
.install-tip b{color:var(--green)}
</style>
</head>
<body>
<div class="app">

  <header class="hd">
    <div class="hd-top">
      <div class="brand"><span class="dot"></span>Cap 95</div>
      <div class="streak">🔥 Série <b id="streakVal">0</b> j</div>
    </div>
    <div class="datenav">
      <button id="prevDay">‹</button>
      <div class="cur" id="curDate">
        <div class="d1">—</div><div class="d2">—</div><div class="d3">—</div>
      </div>
      <button id="nextDay">›</button>
    </div>
  </header>

  <!-- ===== VUE JOUR ===== -->
  <div class="view active" id="view-day">
    <div class="scroll" id="dayContent"></div>
  </div>

  <!-- ===== VUE LECTURE ===== -->
  <div class="view" id="view-read">
    <div class="scroll" id="readContent"></div>
  </div>

  <!-- ===== VUE PROGRESSION ===== -->
  <div class="view" id="view-prog">
    <div class="scroll" id="progContent"></div>
  </div>

  <!-- ===== VUE INFOS ===== -->
  <div class="view" id="view-info">
    <div class="scroll" id="infoContent"></div>
  </div>

  <nav class="nav">
    <div class="nav-in">
      <button class="active" data-view="day">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Jour
      </button>
      <button data-view="read">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Lecture
      </button>
      <button data-view="prog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></svg>
        Progrès
      </button>
      <button data-view="info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        Infos
      </button>
    </div>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script src="data.js"></script>
<script>
// ---------- STOCKAGE LOCAL ----------
const DB = {
  get k(){ return JSON.parse(localStorage.getItem('cap95') || '{}'); },
  set k(v){ localStorage.setItem('cap95', JSON.stringify(v)); },
  getDay(iso){ const d=this.k; return d['day_'+iso] || {}; },
  setDay(iso,v){ const d=this.k; d['day_'+iso]=v; this.k=d; },
  get reading(){ return this.k.reading || {0:0,1:0}; },
  set reading(v){ const d=this.k; d.reading=v; this.k=d; },
  get weights(){ return this.k.weights || []; },
  set weights(v){ const d=this.k; d.weights=v; this.k=d; },
};

// ---------- ÉTAT ----------
let curIdx = 0;
// au démarrage, positionner sur aujourd'hui si dans la plage
(function initIdx(){
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(PLAN_META.start);
  const diff = Math.round((today - start)/86400000);
  if(diff>=0 && diff<PLAN_DATA.length) curIdx = diff;
})();

const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="#241a0e" stroke-width="3.5"><path d="M5 13l4 4L19 7"/></svg>';

// ---------- HELPERS ----------
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1800);
}
function badgeClass(t){ return t==='ON'?'on':t==='OFF'?'off':'we'; }

// ---------- RENDER JOUR ----------
function renderDay(){
  const day = PLAN_DATA[curIdx];
  // date nav
  const parts = day.date_str.split(' ');
  document.getElementById('curDate').innerHTML =
    `<div class="d1">${parts[0]} · Semaine ${day.semaine}</div>
     <div class="d2">${parts.slice(1,3).join(' ')}</div>
     <div class="d3">Jour ${day.index+1} / ${PLAN_DATA.length} · ${day.calories_cible}</div>`;
  document.getElementById('prevDay').style.opacity = curIdx===0?.3:1;
  document.getElementById('nextDay').style.opacity = curIdx===PLAN_DATA.length-1?.3:1;

  const saved = DB.getDay(day.date_iso);
  const checks = saved.checks || {};

  let h = '';
  // badge
  h += `<span class="badge ${badgeClass(day.type_jour)}">${day.badge}</span>`;

  // citation
  h += `<div class="quote"><div class="lbl">Citation du jour</div><p>${day.citation}</p></div>`;

  // ===== POINTS / TÂCHES =====
  const totalPts = day.taches.reduce((s,t)=> s + (checks[t.id]?t.pts:0), 0);
  const pctPts = Math.round(totalPts/day.pts_max*100);
  h += `<div class="card"><div class="card-h">
      <div class="ic" style="background:rgba(224,151,74,.15)">🎯</div>
      <div><h2>Objectifs du jour</h2><div class="sub">Coche ce que tu accomplis · gagne des points</div></div></div>`;
  day.taches.forEach(t=>{
    const done = checks[t.id];
    h += `<div class="task ${done?'done':''}" data-task="${t.id}" data-pts="${t.pts}">
        <div class="cbx">${CHECK_SVG}</div>
        <div class="tlab">${t.label}</div>
        <div class="tp">+${t.pts}</div></div>`;
  });
  h += `<div class="pts-bar"><div class="pl"><span>Points du jour</span><span><b>${totalPts}</b> / ${day.pts_max}</span></div>
        <div class="bar"><i style="width:${pctPts}%"></i></div></div></div>`;

  // ===== PLANNING =====
  h += `<div class="card"><div class="card-h">
      <div class="ic" style="background:rgba(106,156,196,.15)">🕐</div>
      <div><h2>Emploi du temps</h2><div class="sub">Heure par heure</div></div></div>
      <div class="tl">`;
  day.planning.forEach(([time,txt])=>{
    const isSport = txt.includes('🏋️') || txt.includes('SÉANCE');
    h += `<div class="tl-item ${isSport?'sport':''}">
        <div class="tl-time">${time}</div><div class="tl-dot"></div>
        <div class="tl-txt">${txt}</div></div>`;
  });
  h += `</div></div>`;

  // ===== SÉANCE (jours ON) =====
  if(day.seance){
    const s=day.seance;
    h += `<div class="card"><div class="card-h">
        <div class="ic" style="background:rgba(224,151,74,.18)">🏋️</div>
        <div><h2>Séance — ${s.type.split('—')[0].trim()}</h2><div class="sub">${s.type} · ${s.duree}</div></div></div>`;
    h += `<div class="warmup"><div class="wt">⚡ Échauffement (obligatoire)</div><ul>`;
    s.echauffement.forEach(e=>{
      const txt = (typeof e==='string') ? e : e.txt;
      const link = (typeof e==='object' && e.yt) ? ` <a class="yt-mini" href="${e.yt}" target="_blank" rel="noopener">▶ démo</a>` : '';
      h+=`<li>${txt}${link}</li>`;
    });
    h += `</ul></div>`;
    s.exos.forEach(e=>{
      h += `<div class="exo"><div class="exo-h"><div class="en">${e.nom}</div><div class="es">${e.series}</div></div>`;
      if(e.charge && e.charge!=='—') h+=`<div class="ch">⚖️ ${e.charge} · repos ${e.repos}</div>`;
      if(e.note) h+=`<div class="nt">${e.note}</div>`;
      if(e.yt) h+=`<a class="yt-btn" href="${e.yt}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 7.5a3 3 0 0 0-2.1-2.1C19 4.9 12 4.9 12 4.9s-7 0-8.9.5A3 3 0 0 0 1 7.5 31 31 0 0 0 .5 12 31 31 0 0 0 1 16.5a3 3 0 0 0 2.1 2.1c1.9.5 8.9.5 8.9.5s7 0 8.9-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 23.5 12 31 31 0 0 0 23 7.5zM9.6 15.5v-7l6 3.5z"/></svg>
          Voir la démo vidéo</a>`;
      h += `</div>`;
    });
    if(s.finisher) h += `<div class="finisher">🧘 ${s.finisher}</div>`;
    h += `</div>`;
  }

  // ===== MENU =====
  h += `<div class="card"><div class="card-h">
      <div class="ic" style="background:rgba(127,176,105,.15)">🍽️</div>
      <div><h2>Menu proposé</h2><div class="sub">Quantités & calories indicatives</div></div></div>`;
  let tk=0,tp=0,tl=0,tg=0;
  day.menu.repas.forEach(m=>{
    tk+=m.kcal; tp+=m.P; tl+=m.L; tg+=m.G;
    h += `<div class="meal"><div class="meal-h"><div class="mn">${m.nom}</div><div class="mt">${m.heure} · ${m.kcal} kcal</div></div>
        <div class="meal-items">`;
    m.items.forEach(it=> h+=`<div class="meal-row"><span>${it[0]}</span><span class="q">${it[1]} · ${it[2]} kcal</span></div>`);
    h += `</div><div class="meal-macros">
        <div class="macro p"><b>${m.P}g</b><span>PROT</span></div>
        <div class="macro l"><b>${m.L}g</b><span>LIP</span></div>
        <div class="macro g"><b>${m.G}g</b><span>GLUC</span></div>
        <div class="macro k"><b>${m.kcal}</b><span>KCAL</span></div></div></div>`;
  });
  h += `<div class="meal" style="background:rgba(224,151,74,.06);border-color:rgba(224,151,74,.2)">
      <div class="meal-h"><div class="mn">Total journée</div></div>
      <div class="meal-macros" style="border-top:none;padding-top:0">
        <div class="macro p"><b>${tp}g</b><span>PROT</span></div>
        <div class="macro l"><b>${tl}g</b><span>LIP</span></div>
        <div class="macro g"><b>${tg}g</b><span>GLUC</span></div>
        <div class="macro k"><b>${tk}</b><span>KCAL</span></div></div></div>`;
  h += `<div class="cal-target">Cible : <b>${day.calories_cible}</b> · vise 2,5–3 L d'eau</div></div>`;

  // ===== LE SAVIEZ-VOUS =====
  h += `<div class="savoir"><div class="lbl">💡 Le saviez-vous ?</div><p>${day.saviez_vous}</p></div>`;

  document.getElementById('dayContent').innerHTML = h;

  // bind tasks
  document.querySelectorAll('#dayContent .task').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id=el.dataset.task;
      const s=DB.getDay(day.date_iso); s.checks=s.checks||{};
      s.checks[id]=!s.checks[id];
      DB.setDay(day.date_iso,s);
      if(s.checks[id]) toast(`+${el.dataset.pts} points ! 💪`);
      renderDay(); updateStreak();
    });
  });
}

// ---------- STREAK ----------
function updateStreak(){
  // série = jours consécutifs (jusqu'à aujourd'hui/jour courant) avec >=60% des points
  let streak=0;
  for(let i=curIdx;i>=0;i--){
    const d=PLAN_DATA[i]; const s=DB.getDay(d.date_iso); const c=s.checks||{};
    const pts=d.taches.reduce((a,t)=>a+(c[t.id]?t.pts:0),0);
    if(pts/d.pts_max>=0.6) streak++; else break;
  }
  document.getElementById('streakVal').textContent=streak;
}

// ---------- RENDER LECTURE ----------
function renderRead(){
  const r=DB.reading;
  let h=`<span class="badge we" style="margin-top:14px">📚 Suivi de lecture · modifiable</span>`;
  h+=`<div class="savoir" style="margin-bottom:18px"><div class="lbl">💡 Le saviez-vous ?</div>
      <p>Lire 20 minutes avant de dormir réduit le stress jusqu'à 68 % et améliore la qualité du sommeil. Ta meilleure arme anti-brouillard mental.</p></div>`;
  PLAN_META.livres.forEach((b,i)=>{
    const cur=r[i]||0; const pct=Math.round(cur/b.pages*100);
    h+=`<div class="card"><div class="book" style="border:none;padding:0;background:none">
        <div class="book-h"><div><div class="bt">${b.titre}</div><div class="ba">${b.auteur} · ${b.pages} pages</div></div></div>
        <div class="bprog"><div class="bbar"><i style="width:${pct}%"></i></div><div class="bpct">${pct}%</div></div>
        <div class="page-ctrl">
          <input type="number" min="0" max="${b.pages}" value="${cur}" data-book="${i}" placeholder="Page actuelle">
          <span class="pg-of">/ ${b.pages} p.</span>
        </div></div></div>`;
  });
  // total
  const totRead=(r[0]||0)+(r[1]||0);
  const totPages=PLAN_META.livres.reduce((s,b)=>s+b.pages,0);
  h+=`<div class="stat" style="margin-top:4px"><div class="sv">${totRead}</div><div class="sl">pages lues sur ${totPages} au total</div></div>`;
  document.getElementById('readContent').innerHTML=h;
  document.querySelectorAll('#readContent input[data-book]').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const r=DB.reading; const i=+inp.dataset.book;
      let v=Math.max(0,Math.min(+inp.value||0, PLAN_META.livres[i].pages));
      r[i]=v; DB.reading=r; renderRead(); toast('Lecture mise à jour 📖');
    });
  });
}

// ---------- RENDER PROGRESSION ----------
function renderProg(){
  // calcul points totaux + jours complétés
  let totalPts=0, daysActive=0, daysFull=0, sportDone=0, sportTotal=0;
  PLAN_DATA.forEach(d=>{
    const s=DB.getDay(d.date_iso); const c=s.checks||{};
    const p=d.taches.reduce((a,t)=>a+(c[t.id]?t.pts:0),0);
    totalPts+=p;
    if(p>0) daysActive++;
    if(p===d.pts_max) daysFull++;
    if(d.seance){ sportTotal++; if(c.sport) sportDone++; }
  });
  const weights=DB.weights;
  const lastW = weights.length? weights[weights.length-1].w : PLAN_META.poids_depart;
  const lost = (PLAN_META.poids_depart - lastW).toFixed(1);

  let h=`<span class="badge on" style="margin-top:14px">📊 Ta progression</span>`;

  h+=`<div class="stat-grid">
    <div class="stat"><div class="sv">${totalPts}</div><div class="sl">points cumulés</div></div>
    <div class="stat"><div class="sv">${daysFull}</div><div class="sl">jours parfaits ✨</div></div>
    <div class="stat"><div class="sv">${sportDone}/${sportTotal||0}</div><div class="sl">séances faites</div></div>
    <div class="stat"><div class="sv">${lost>0?'-':''}${Math.abs(lost)}</div><div class="sl">kg ${lost>=0?'perdus':'pris'}</div></div>
  </div>`;

  // suivi du poids
  h+=`<div class="card"><div class="card-h"><div class="ic" style="background:rgba(224,151,74,.15)">⚖️</div>
      <div><h2>Suivi du poids</h2><div class="sub">Départ ${PLAN_META.poids_depart} kg · objectif intermédiaire ${PLAN_META.objectif_intermediaire} kg</div></div></div>`;
  // mini courbe
  if(weights.length){
    h+=`<svg viewBox="0 0 300 90" style="width:100%;height:90px;margin-bottom:10px">`;
    const ws=weights.slice(-20);
    const min=Math.min(...ws.map(x=>x.w))-1, max=Math.max(...ws.map(x=>x.w))+1;
    const pts=ws.map((x,i)=>{
      const px=ws.length>1? i/(ws.length-1)*290+5 : 150;
      const py=85-(x.w-min)/(max-min)*75;
      return `${px},${py}`;
    }).join(' ');
    h+=`<polyline points="${pts}" fill="none" stroke="#f4b265" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    ws.forEach((x,i)=>{ const px=ws.length>1? i/(ws.length-1)*290+5 : 150; const py=85-(x.w-min)/(max-min)*75;
      h+=`<circle cx="${px}" cy="${py}" r="3" fill="#f4b265"/>`; });
    h+=`</svg>`;
  } else {
    h+=`<p style="font-size:13px;color:var(--ink3);text-align:center;padding:14px 0">Ajoute ta première pesée 👇</p>`;
  }
  h+=`<div class="weight-input"><input type="number" step="0.1" id="wInput" placeholder="${lastW} kg"><button id="wAdd">Ajouter</button></div></div>`;

  // médailles / récompenses
  const medals=[
    {ic:'🌱',t:'Premiers pas',d:'Premier jour validé',ok:daysActive>=1},
    {ic:'🔥',t:'En feu',d:'7 jours actifs',ok:daysActive>=7},
    {ic:'💪',t:'Guerrier régulier',d:'10 séances de sport',ok:sportDone>=10},
    {ic:'⭐',t:'Perfectionniste',d:'5 jours parfaits',ok:daysFull>=5},
    {ic:'📚',t:'Esprit clair',d:'200 pages lues',ok:((DB.reading[0]||0)+(DB.reading[1]||0))>=200},
    {ic:'🏆',t:'Discipline d\'acier',d:'1000 points cumulés',ok:totalPts>=1000},
    {ic:'🥋',t:'Prêt pour le tatami',d:'30 jours actifs',ok:daysActive>=30},
    {ic:'👑',t:'Transformation',d:'-5 kg atteints',ok:lost>=5},
  ];
  h+=`<div class="card"><div class="card-h"><div class="ic" style="background:rgba(224,151,74,.15)">🏅</div>
      <div><h2>Récompenses</h2><div class="sub">${medals.filter(m=>m.ok).length} / ${medals.length} débloquées</div></div></div>
      <div class="medal-list">`;
  medals.forEach(m=>{
    h+=`<div class="medal ${m.ok?'unlocked':'locked'}"><div class="mi">${m.ok?m.ic:'🔒'}</div>
        <div class="mtxt"><b>${m.t}</b><span>${m.d}</span></div></div>`;
  });
  h+=`</div></div>`;

  document.getElementById('progContent').innerHTML=h;
  const wb=document.getElementById('wAdd');
  if(wb) wb.addEventListener('click',()=>{
    const v=parseFloat(document.getElementById('wInput').value);
    if(!v||v<30||v>250){ toast('Entre un poids valide'); return; }
    const w=DB.weights; w.push({d:new Date().toISOString(),w:v}); DB.weights=w;
    renderProg(); toast('Pesée enregistrée ⚖️');
  });
}

// ---------- NAVIGATION ----------
document.getElementById('prevDay').onclick=()=>{ if(curIdx>0){curIdx--; renderDay(); updateStreak(); window.scrollTo(0,0);} };
document.getElementById('nextDay').onclick=()=>{ if(curIdx<PLAN_DATA.length-1){curIdx++; renderDay(); updateStreak(); window.scrollTo(0,0);} };

document.querySelectorAll('.nav-in button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nav-in button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    b.classList.add('active');
    const v=b.dataset.view;
    document.getElementById('view-'+v).classList.add('active');
    window.scrollTo(0,0);
    if(v==='read') renderRead();
    if(v==='prog') renderProg();
    if(v==='info') renderInfo();
  });
});

// swipe gauche/droite pour changer de jour (vue jour seulement)
let tx=0;
document.getElementById('view-day').addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
document.getElementById('view-day').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>70){
    if(dx<0 && curIdx<PLAN_DATA.length-1){curIdx++;renderDay();updateStreak();window.scrollTo(0,0);}
    if(dx>0 && curIdx>0){curIdx--;renderDay();updateStreak();window.scrollTo(0,0);}
  }
},{passive:true});

// ---------- INIT ----------
renderDay();
updateStreak();

// service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
